<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <base href="/LoveCQL/">
  <title>彩蛋 · 地球Online</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* 本页纯黑背景 */
    body {
      background: #000 !important;
    }

    /* 中央容器 */
    .hidden-center {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(52px + var(--sat)) 40px calc(52px + var(--sab));
      text-align: center;
      gap: 0;
    }

    /* 文字行 */
    .h-line {
      font-size: clamp(16px, 4.8vw, 22px);
      color: rgba(255, 255, 255, 0.88);
      line-height: 3;
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.25s ease, font-size 1.4s ease, line-height 1.4s ease;
    }
    .h-line.show { opacity: 1; }

    /* 粉色强调行 */
    .h-line.accent {
      color: rgba(255, 107, 157, 0.9);
      font-size: clamp(14px, 4vw, 18px);
      text-shadow: 0 0 16px rgba(255,107,157,0.4);
      line-height: 3;
    }

    /* 停顿分割装饰 */
    .h-pause {
      width: 1px;
      height: 48px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(255,107,157,0.3),
        transparent
      );
      margin: 6px auto;
      opacity: 0;
      transition: opacity 1.8s ease, height 1.4s ease, margin 1.4s ease;
    }
    .h-pause.show { opacity: 1; }

    /* 最终行 - 特别强调 */
    .h-win {
      font-size: clamp(20px, 5.5vw, 26px);
      color: rgba(255,215,0,0.9);
      letter-spacing: 3px;
      text-shadow: 0 0 22px rgba(255,215,0,0.45);
      line-height: 2;
      opacity: 0;
      transition: opacity 0.25s ease, font-size 1.4s ease, line-height 1.4s ease;
    }
    .h-win.show { opacity: 1; }

    /* ── 压缩状态：告白前所有上方内容向上收缩 ── */
    .hidden-center.compressed .h-line {
      font-size: clamp(10px, 2.8vw, 13px);
      line-height: 1.5;
    }
    .hidden-center.compressed .h-line.accent {
      font-size: clamp(9px, 2.5vw, 12px);
    }
    .hidden-center.compressed .h-pause {
      height: 10px;
      margin: 2px auto;
    }
    .hidden-center.compressed .h-win {
      font-size: clamp(12px, 3.2vw, 16px);
      line-height: 1.5;
    }
    .hidden-center.compressed .cursor-dot {
      margin: 2px auto;
    }

    /* ── 告白大字 ── */
    .h-confess {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-size: clamp(30px, 9vw, 52px);
      color: #ff6b9d;
      font-weight: 700;
      letter-spacing: 5px;
      text-shadow:
        0 0 20px rgba(255,107,157,1),
        0 0 50px rgba(255,107,157,0.8),
        0 0 100px rgba(255,107,157,0.5),
        0 0 160px rgba(255,107,157,0.25);
      opacity: 0;
      transform: scale(0.15);
      transform-origin: center;
      transition: opacity 2.6s ease, transform 3s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-top: 14px;
      line-height: 1.8;
    }
    .h-confess.show {
      opacity: 1;
      transform: scale(1);
      /* 放大完成后（3.2s延迟）开启持续心跳 */
      animation: confess-beat 1.15s ease-in-out 3.2s infinite;
    }

    /* 双峰心跳：模拟真实心脏节律 */
    @keyframes confess-beat {
      0%   { transform: scale(1);    }
      12%  { transform: scale(1.07); }
      24%  { transform: scale(0.97); }
      36%  { transform: scale(1.05); }
      50%  { transform: scale(1);    }
      100% { transform: scale(1);    }
    }

    /* ── 中间爱心 ── */
    .confess-heart {
      display: block;
      color: #ff3366;
      font-size: 1em;
      filter: drop-shadow(0 0 10px rgba(255,51,102,0.9))
              drop-shadow(0 0 22px rgba(255,51,102,0.5));
      margin: 0;
      vertical-align: middle;
      /* 放大完成后同步开始独立跳动，幅度略大 */
      animation: heart-pulse 1.15s ease-in-out 3.2s infinite;
    }

    @keyframes heart-pulse {
      0%   { transform: scale(1);    }
      12%  { transform: scale(1.35); }
      24%  { transform: scale(0.92); }
      36%  { transform: scale(1.2);  }
      50%  { transform: scale(1);    }
      100% { transform: scale(1);    }
    }

    /* 返回按钮（右下角） */
    .back-btn {
      position: fixed;
      bottom: calc(22px + var(--sab));
      left: calc(22px + var(--sal));
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px;
      cursor: pointer;
      z-index: 100;
      opacity: 0;
      transition: opacity 1.5s ease;
      touch-action: manipulation;
    }
    .back-btn.show { opacity: 1; }
    .back-btn:active { opacity: 0.5; }

    /* 光标装饰 */
    .cursor-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,107,157,0.6);
      margin: 4px auto;
      box-shadow: 0 0 8px rgba(255,107,157,0.5);
      opacity: 0;
      transition: opacity 1.5s ease;
      animation: blink 2s infinite;
    }
    .cursor-dot.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- 过渡遮罩 -->
  <div id="transition-overlay"
       style="background:#000;"></div>

  <!-- 主体内容 -->
  <div class="hidden-center">

    <!-- 第一段 -->
    <div class="h-line" id="hl-1"></div>
    <div class="h-line" id="hl-2"></div>

    <!-- 停顿装饰 -->
    <div class="h-pause" id="hp-1"></div>

    <!-- 第二段 -->
    <div class="h-line" id="hl-3"></div>
    <div class="h-line accent" id="hl-4"></div>

    <!-- 停顿装饰 -->
    <div class="h-pause" id="hp-2"></div>

    <!-- 第三段 -->
    <div class="h-line" id="hl-5"></div>

    <!-- 闪动光标 -->
    <div class="cursor-dot" id="cursor-d"></div>

    <!-- 最终句 -->
    <div class="h-win" id="hl-win"></div>

    <!-- 告白大字（压缩后放大出现）-->
    <div class="h-confess" id="hl-confess">
      <span>陈清莲</span>
      <span class="confess-heart">❤</span>
      <span>我喜欢你</span>
    </div>

  </div>

  <!-- 返回按钮 -->
  <div class="back-btn" id="back-btn" onclick="goBack()">← 返回</div>

  <script src="js/page-transition.js"></script>
  <script src="js/typewriter.js"></script>
  <script>
    /* ================================================
       逐步显示彩蛋文字（使用 CSS transition + class）
       每段之间有停顿，模拟"说话"节奏感
       ================================================ */
    /* 各行文案（打字机逐字显示，除告白大字外）*/
    const TW_TEXTS = {
      'hl-1':   '其实我做这个网页的时候',
      'hl-2':   '我一直在想你',
      'hl-3':   '我在想你看到会不会哭',
      'hl-4':   '会不会满脑子都是我',
      'hl-5':   '如果你看到这里了',
      'hl-win': '那我赢了 ✦',
    };

    const sequence = [
      { id: 'hl-1',      delay:  1000 },  // 11字 × 140ms ≈ 1.5s
      { id: 'hl-2',      delay:  3200 },  // 停顿后第二句
      { id: 'hp-1',      delay:  4600 },
      { id: 'hl-3',      delay:  5600 },  // 10字 × 140ms ≈ 1.4s
      { id: 'hl-4',      delay:  7800 },
      { id: 'hp-2',      delay:  9400 },
      { id: 'hl-5',      delay: 10400 },  // 8字 × 140ms ≈ 1.1s
      { id: 'cursor-d',  delay: 12200 },
      { id: 'hl-win',    delay: 13400 },  // 打出后停顿
      /* 停顿后：上方内容压缩 + 告白大字登场 */
      { id: null,        delay: 16000, compress: true },
      { id: 'hl-confess',delay: 16700 },
      { id: 'back-btn',  delay: 21000 },
    ];

    /* 带停顿的自定义打字机（pauseAt: 第几个字后停顿， pauseMs: 停顿毫秒）*/
    function typePause(el, text, speed, pauseAt, pauseMs) {
      let i = 0;
      const tick = () => {
        if (i > text.length) return;
        el.textContent = text.substring(0, i);
        i++;
        setTimeout(tick, i === pauseAt + 1 ? pauseMs : speed);
      };
      tick();
    }

    sequence.forEach(({ id, delay, compress }) => {
      setTimeout(() => {
        if (compress) {
          document.querySelector('.hidden-center').classList.add('compressed');
        }
        if (!id) return;
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add('show');
        /* 打字机：仅处理文字行，告白大字保留缩放动画 */
        if (id === 'hl-3') {
          /* “我在想”后停顿 900ms，再继续打 */
          el.textContent = '';
          typePause(el, TW_TEXTS['hl-3'], 140, 3, 900);
        } else if (TW_TEXTS[id] !== undefined) {
          el.textContent = '';
          new Typewriter(el, { speed: 140, cursor: false }).type(TW_TEXTS[id]);
        }
      }, delay);
    });

    /* ================================================
       返回结局页面
       ================================================ */
    function goBack() {
      vibrate(20);
      navigateTo('ending.html');
    }
  </script>
</body>
</html>
